name: Build Static Node.js for OpenHarmony

on:
  push:
    branches: [ "dev-ohos-static" ]
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build (e.g., v24.2.0)'
        required: true
        default: 'v24.2.0'

permissions: write-all

jobs:
  build-static:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq git make gcc g++ python3 unzip

      - name: Set Node.js version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.node_version }}" >> $GITHUB_ENV
          else
            echo "VERSION=v24.2.0" >> $GITHUB_ENV
          fi

      - name: Setup OpenHarmony SDK
        run: |
          query_component() {
            component=$1
            curl -fsSL 'https://ci.openharmony.cn/api/daily_build/build/list/component' \
              -H 'Accept: application/json, text/plain, */*' \
              -H 'Content-Type: application/json' \
              --data-raw '{"projectName":"openharmony","branch":"master","pageNum":1,"pageSize":10,"deviceLevel":"","component":"'${component}'","type":1,"startTime":"2025080100000000","endTime":"20990101235959","sortType":"","sortField":"","hardwareBoard":"","buildStatus":"success","buildFailReason":"","withDomain":1}'
          }
          
          sdk_download_url=$(query_component "ohos-sdk-public" | jq -r ".data.list.dataList[0].obsPath")
          echo "Downloading SDK from: $sdk_download_url"
          curl -L $sdk_download_url -o ohos-sdk-public.tar.gz
          sudo mkdir -p /opt/ohos-sdk
          sudo tar -zxf ohos-sdk-public.tar.gz -C /opt/ohos-sdk
          rm -rf ohos-sdk-public.tar.gz
          sudo rm -rf /opt/ohos-sdk/windows
          cd /opt/ohos-sdk/linux
          sudo unzip -q toolchains-*.zip
          sudo rm -rf *.zip
          cd -

      - name: Setup LLVM-19
        run: |
          query_component() {
            component=$1
            curl -fsSL 'https://ci.openharmony.cn/api/daily_build/build/list/component' \
              -H 'Accept: application/json, text/plain, */*' \
              -H 'Content-Type: application/json' \
              --data-raw '{"projectName":"openharmony","branch":"master","pageNum":1,"pageSize":10,"deviceLevel":"","component":"'${component}'","type":1,"startTime":"2025080100000000","endTime":"20990101235959","sortType":"","sortField":"","hardwareBoard":"","buildStatus":"success","buildFailReason":"","withDomain":1}'
          }
          
          llvm19_download_url=$(query_component "LLVM-19" | jq -r ".data.list.dataList[0].obsPath")
          echo "Downloading LLVM-19 from: $llvm19_download_url"
          curl -L $llvm19_download_url -o LLVM-19.tar.gz
          sudo mkdir -p /opt/llvm-19
          sudo tar -zxf LLVM-19.tar.gz -C /opt/llvm-19
          rm -rf LLVM-19.tar.gz
          cd /opt/llvm-19
          sudo tar -zxf llvm-linux-x86_64.tar.gz
          sudo tar -zxf ohos-sysroot.tar.gz
          sudo rm -rf *.tar.gz
          cd -

      - name: Clone Node.js source
        run: |
          git clone --branch ${{ env.VERSION }} --depth 1 https://github.com/nodejs/node.git

      - name: Build Node.js (Static)
        run: |
          cd node
          
          # Apply patch if needed
          need_patch_versions="v24.2.0 v24.3.0 v24.4.0 v24.4.1 v24.5.0 v24.6.0"
          if echo " $need_patch_versions " | grep -q " ${{ env.VERSION }} "; then
              patch -p1 < ../0001-fix-argument-list-too-long.patch
          fi
          
          # Setup compilers
          export CC="/opt/llvm-19/llvm/bin/aarch64-unknown-linux-ohos-clang"
          export CXX="/opt/llvm-19/llvm/bin/aarch64-unknown-linux-ohos-clang++"
          
          need_no_error_versions="v24.2.0 v24.3.0 v24.4.0 v24.4.1 v24.5.0 v24.6.0 v24.7.0 v24.8.0"
          if echo " $need_no_error_versions " | grep -q " ${{ env.VERSION }} "; then
              export CC="$CC -Wno-error=implicit-function-declaration"
              export CXX="$CXX -Wno-error=implicit-function-declaration"
          fi
          
          export CC_host="gcc"
          export CXX_host="g++"
          
          # Configure with static linking
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=openharmony \
            --cross-compiling \
            --prefix=node-${{ env.VERSION }}-openharmony-arm64-static \
            --fully-static \
            --enable-static
          
          # Build
          make -j$(nproc)
          make install

      - name: Code signing
        run: |
          cd node
          /opt/ohos-sdk/linux/toolchains/lib/binary-sign-tool sign \
            -inFile node-${{ env.VERSION }}-openharmony-arm64-static/bin/node \
            -outFile node-${{ env.VERSION }}-openharmony-arm64-static/bin/node \
            -selfSign 1

      - name: Package
        run: |
          cd node
          cp LICENSE node-${{ env.VERSION }}-openharmony-arm64-static/
          tar -zcf node-${{ env.VERSION }}-openharmony-arm64-static.tar.gz node-${{ env.VERSION }}-openharmony-arm64-static

      - name: Verify binary
        run: |
          cd node/node-${{ env.VERSION }}-openharmony-arm64-static/bin
          file node
          ls -lh node

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ env.VERSION }}-openharmony-arm64-static
          path: "./node/node-${{ env.VERSION }}-openharmony-arm64-static.tar.gz"
          compression-level: 0
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: "./node/node-${{ env.VERSION }}-openharmony-arm64-static.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
