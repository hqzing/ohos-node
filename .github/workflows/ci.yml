name: CI

on:
  release:
    types: [created]
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 17 * * *'

permissions: write-all

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set Node.js branch or tag name
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          else
            echo "VERSION=main" >> $GITHUB_ENV
          fi
      - name: Install tools
        run: sudo apt update && sudo apt install -y build-essential unzip jq
      - name: Build
        run: ./build.sh ${{ env.VERSION }}
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          path: node-${{ env.VERSION }}-openharmony-arm64.tar.gz
          retention-days: 7
      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: node-${{ env.VERSION }}-openharmony-arm64.tar.gz
